name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git user identity for committing migration changes
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          
          # Install and initialize Git LFS
          git lfs install
          
          # Checkout a clean local branch to avoid detached HEAD and migrate all image binaries to Git LFS
          git checkout -B temp-main
          git lfs migrate import --branches=temp-main --include="*.jpg,*.png,*.jpeg,*.gif,*.ico,*.webp"
          
          # Add Hugging Face as remote and push the converted branch to its main branch
          git remote add hf https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mazai68/hima-trading
          git push --force hf temp-main:main
