name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mazai68/hima-trading
          git push --force hf HEAD:main
